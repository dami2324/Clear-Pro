name: Build/Publish Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_VERSION: 1.0.7

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Enable Developer Mode (Windows only)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          reg add "HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock" /t REG_DWORD /f /v "AllowDevelopmentWithoutDevLicense" /d "1"

      - name: Build & Publish (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          $env:ELECTRON_BUILDER_CACHE = Join-Path (Get-Location) ".cache\electron-builder"
          npx electron-builder --win nsis --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ClearPro-Windows-${{ github.ref_name }}
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml

      - name: Package Windows ZIP folder
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          $zipRoot = "ClearPro-Windows-${env:APP_VERSION}"
          New-Item -ItemType Directory -Force -Path $zipRoot | Out-Null
          Copy-Item "dist\*.exe" $zipRoot
          Copy-Item "Autoria y Licencia.pdf" $zipRoot
          Copy-Item "Manual de Instrucciones.pdf" $zipRoot
          Compress-Archive -Path $zipRoot -DestinationPath "$zipRoot.zip" -Force

      - name: Upload Windows ZIP artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ClearPro-Windows-${{ env.APP_VERSION }}
          path: ClearPro-Windows-${{ env.APP_VERSION }}.zip

      - name: Attach Windows ZIP folder to release
        if: matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/')
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "ClearPro-Windows-${env:APP_VERSION}.zip" --clobber

      - name: Build & Publish (macOS)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac dmg --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS installer artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ClearPro-macOS-${{ github.ref_name }}
          path: |
            dist/*.dmg
            dist/*.blockmap
            dist/latest-mac.yml

      - name: Package macOS ZIP folder
        if: matrix.os == 'macos-latest'
        run: |
          zip_root="ClearPro-macOS-${APP_VERSION}"
          mkdir -p "$zip_root"
          cp dist/*.dmg "$zip_root/"
          cp "Autoria y Licencia.pdf" "$zip_root/"
          cp "Manual de Instrucciones.pdf" "$zip_root/"
          ditto -c -k --sequesterRsrc --keepParent "$zip_root" "$zip_root.zip"

      - name: Upload macOS ZIP artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ClearPro-macOS-${{ env.APP_VERSION }}
          path: ClearPro-macOS-${{ env.APP_VERSION }}.zip

      - name: Attach macOS ZIP folder to release
        if: matrix.os == 'macos-latest' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "ClearPro-macOS-${APP_VERSION}.zip" --clobber
