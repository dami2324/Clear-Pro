name: Build/Publish Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build & Publish (Windows)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win nsis --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Publish (macOS)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac dmg --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
